name: Build Desktop Executables

on:
  push:
    tags:
      - 'v*' # Runs when you push a version tag like v1.0.0
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: DataAnalysisStudio-linux
            pyinstaller_args: --add-data "frontend:frontend"
          - os: macos-latest
            artifact_name: DataAnalysisStudio-macos
            pyinstaller_args: --add-data "frontend:frontend"
          - os: windows-latest
            artifact_name: DataAnalysisStudio-windows.exe
            pyinstaller_args: --add-data "frontend;frontend"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onefile --noconsole ${{ matrix.pyinstaller_args }} --name "DataAnalysisStudio" launcher.py

      - name: Rename executable on Unix (non-Windows)
        if: matrix.os != 'windows-latest'
        run: |
          mv dist/DataAnalysisStudio dist/${{ matrix.artifact_name }}

      - name: Rename executable on Windows
        if: matrix.os == 'windows-latest'
        run: |
          mv dist/DataAnalysisStudio.exe dist/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # Only run if tag is pushed
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/DataAnalysisStudio-windows.exe/DataAnalysisStudio-windows.exe
            artifacts/DataAnalysisStudio-macos/DataAnalysisStudio-macos
            artifacts/DataAnalysisStudio-linux/DataAnalysisStudio-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
